name: Sample Workout
items:
  - type: superset
    label: Warmup
    sets: 1
    items:
      - type: exercise
        id: jumping_jacks
        sets: 1
        reps: 20
        rest_sec: 30
        notes: ''
      - type: exercise
        id: high_knees
        sets: 1
        reps: 15
        rest_sec: 15
        notes: ''
  - type: superset
    label: Main Sets
    sets: 3
    items:
      - type: superset
        label: Torture
        sets: 3
        items:
          - type: exercise
            id: burpees
            sets: 1
            reps: 1
            rest_sec: 30
            notes: ''
            hold_sec: 10
      - type: exercise
        id: pushups
        sets: 1
        reps: 10
        rest_sec: 45
        notes: ''
      - type: exercise
        id: mountain_climbers
        sets: 1
        reps: 15
        rest_sec: 30
        notes: ''
  - type: superset
    label: Burnout
    sets: 5
    items:
      - type: exercise
        id: burpees
        sets: 1
        reps: 8
        rest_sec: 60
        notes: ''
  - type: superset
    label: Cooldown
    sets: 2
    items:
      - type: exercise
        id: toe_touches
        sets: 1
        reps: 10
        rest_sec: 15
        notes: ''
      - type: exercise
        id: quad_stretch
        sets: 1
        reps: 5
        rest_sec: 20
        notes: ''
